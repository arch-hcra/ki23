apiVersion: apps/v1
kind: Deployment
metadata:
  name: ki23-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ki23-app
  template:
    metadata:
      labels:
        app: ki23-app
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: ki23-app
        image: docker.io/archcra/ki23-app:latest
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
