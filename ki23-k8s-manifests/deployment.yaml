apiVersion: apps/v1
kind: Deployment
metadata:
  name: ki23-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ki23-app
  template:
    metadata:
      labels:
        app: ki23-app
    spec:
      containers:
      - name: ki23-app
        image: docker.io/archcra/ki23-app:0.0.0-dev
        ports:
        - containerPort: 5000
